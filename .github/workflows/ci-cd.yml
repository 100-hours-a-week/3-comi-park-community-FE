# ❗ Deprecated Workflow
# This CI pipeline is disabled and kept only for historic reference.
# Do not remove for now, but it will NOT trigger on push or PR.

name: Express CI/CD

on:
    workflow_dispatch:

jobs:
    push:
        name: Docker build & push
        runs-on: ubuntu-latest

        steps:
            - name: Checkout source
              uses: actions/checkout@v4

            - name: Login to Portainer Registry
              run: |
                  echo "🔐 Logging in to registry..."
                  echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login \
                    ${{ secrets.REGISTRY_URL }} \
                    --username "${{ secrets.REGISTRY_USERNAME }}" \
                    --password-stdin \
                    || { echo "❌ Registry login FAILED"; exit 1; }
                  echo "✅ Registry login successful"

            - name: Build docker image
              run: |
                  IMAGE_URI="${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_REPOSITORY }}:latest"
                  echo "IMAGE_URI=${IMAGE_URI}" >> $GITHUB_ENV
                  echo "🛠 Building image: $IMAGE_URI"
                  docker build -t "${IMAGE_URI}" . || { echo "❌ Docker build FAILED"; exit 1; }
                  echo "✅ Docker build successful"

            - name: Push docker image
              run: |
                  echo "⬆️ Pushing image: ${IMAGE_URI}"
                  docker push "${{ env.IMAGE_URI }}" || { echo "❌ Docker push FAILED"; exit 1; }
                  echo "🎉 Docker push successful"

    deploy:
        name: Deploy (SSM)
        runs-on: ubuntu-latest
        needs: push # push 성공 시 진행

        steps:
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Deploy to EC2 using SSM
              run: |
                  aws ssm send-command \
                    --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
                    --document-name "AWS-RunShellScript" \
                    --comment "Deploy Spring using Docker Compose" \
                    --parameters '{
                      "commands": [
                        "cd /home/ubuntu",
                        "docker compose -f docker-compose-express.yml pull express",
                        "docker compose -f docker-compose-express.yml up -d express"
                      ]
                    }'
